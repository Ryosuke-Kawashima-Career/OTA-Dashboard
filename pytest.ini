[pytest]
# Repo-wide pytest config. Lives at the root so `pytest` works from
# anywhere in the tree and the same options apply to backend + ingestion.

# Ingestion tests import `app.models` from backend, so backend/ must be
# on sys.path. Listing both means `pytest ingestion/tests` works from
# the repo root without needing PYTHONPATH=backend:. on the command line.
pythonpath = . backend

# Discover tests in both subprojects in a single invocation.
testpaths = backend ingestion

# pytest-asyncio ≥0.24 deprecates the implicit default fixture-loop
# scope. The Phase-7 ingestion tests are all sync, but the plugin is
# globally registered (backend uses async), so the warning fires here
# too. Pinning the default to "function" matches the historical
# behaviour and silences the warning everywhere.
asyncio_default_fixture_loop_scope = function
asyncio_mode = strict

# Suppress upstream warnings from pytest-asyncio 0.24 that fire on
# Python 3.14: the plugin still calls asyncio.iscoroutinefunction and
# asyncio.get_event_loop_policy, both deprecated for removal in 3.16.
# These originate inside pytest_asyncio/plugin.py — they are not from
# our code, and we cannot fix them upstream from here. The filters
# below are deliberately narrow (matched on the module path AND the
# message text) so any *new* DeprecationWarning from elsewhere still
# surfaces. Drop these two lines when pytest-asyncio publishes a
# 3.14-compatible release.
filterwarnings =
    ignore:'asyncio.iscoroutinefunction' is deprecated.*:DeprecationWarning:pytest_asyncio.plugin
    ignore:'asyncio.get_event_loop_policy' is deprecated.*:DeprecationWarning:pytest_asyncio.plugin
